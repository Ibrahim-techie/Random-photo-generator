<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Random-Photo-Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-black d-flex justify-content-center align-items-center vh-100">

<div class="card" style="width:18rem; background-color:#3a3a3a;">
    <img
        src=""
        id="img"
        class="card-img-top p-3"
        alt="Image"
        style="height:220px; object-fit:contain;"
    >

    <div class="card-body text-white">
        

        <p class="card-text" style="text-align: center;">
           Click the Button below 👇 to Generate random Image 
        </p>

        <div class="d-grid">
            <button id="btn" class="btn btn-primary">
                Button
            </button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="script.js"></script>

</body>
</html>
